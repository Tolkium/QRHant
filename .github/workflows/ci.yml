name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npx ng test
      - run: npx ng build
      # Deploy dist/qrhunt/browser to your static host (Cloudflare/GitHub Pages)
      # once the repository and hosting account exist.
